<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Insert title here</title>
</head>

<body>

<!-- 조각 파일이라 body 없음 -->
<form id="postForm" class="card shadow-sm border-0 p-4 mx-auto" autocomplete="off">
    <div class="row g-3">
        <!-- 제목 -->
        <div class="col-md-6">
            <div class="form-floating">
                <input name="title" id="title" class="form-control" placeholder="제목" required maxlength="200" />
                <label for="title">제목</label>
            </div>
        </div>

        <!-- 작성자 -->
        <div class="col-md-6">
            <div class="form-floating">
                <input name="author" id="author" class="form-control" placeholder="작성자" required maxlength="50" />
                <label for="author">작성자</label>
            </div>
        </div>

        <!-- 내용 -->
        <div class="col-12">
            <div class="form-floating">
                <textarea name="content" id="content" class="form-control" placeholder="내용" required maxlength="5000" style="height: 180px;"></textarea>
                <label for="content">내용</label>
            </div>
        </div>

        <!-- 버튼 -->
        <div class="col-12 d-flex gap-2 justify-content-end mt-2">
            <button id="cancelBtn" type="button" class="btn btn-outline-secondary">닫기</button>
            <button id="resetBtn" type="reset" class="btn btn-outline-secondary">초기화</button>
            <button id="submitBtn" type="submit" class="btn btn-outline-secondary">등록</button>
        </div>

        <!-- 안내문 -->
        <div class="col-12">
            <p class="text-muted small mb-0">※ 데이터는 이 브라우저의 로컬스토리지에 저장됩니다.</p>
        </div>
    </div>
</form>




</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <input type="text" name="userId" placeholder="아이디를 입력해주세요."/><br>
    <input type="password" name="pwd" placeholder="비밀번호를 입력해주세요."/><br>
    <input type="text" name="userName" placeholder="이름을 입력해주세요."><br>
    <input type="text" name="email" placeholder="이메일을 입력해주세요."/><br>
    <input type="text" name="phone" placeholder="전화번호를 입력해주세요."/><br>
    <input type="text" name="birth" placeholder="생년월일을 입력해주세요."/><br>
    
    <input type="radio" name="gender" value="men"/><span id="men">남자</span><br>
    <input type="radio" name="gender" value="women"/><span id="women">여자</span><br>
    
    <input type="text" name="address" placeholder="주소를 입력해주세요."/><br>

    <input type="text" name="zipcode" placeholder="우편번호를 입력해주세요."/><br>
    
    <input type="submit" value="회원가입" onclick="signUp();" id="signUp">












</body>
</html>
